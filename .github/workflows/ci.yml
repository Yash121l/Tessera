name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff check
        run: uv run ruff check src tests

      - name: Ruff format check
        run: uv run ruff format --check src tests

      - name: Black check
        run: uv run black --check src tests

      - name: Mypy strict
        run: uv run mypy src

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"
          enable-cache: true

      - name: Install dependencies
        # backtest: nautilus-trader + quantstats (required for smoke test coverage)
        # ml: lightgbm (required for smoke test model training)
        # sequence/docs omitted — heavy torch deps not needed for coverage
        run: uv sync --extra dev --extra ml --extra backtest

      - name: Run tests
        run: uv run pytest --cov=tessera --cov-report=term-missing --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        # fail_ci_if_error: false — upload is best-effort; CI should not fail
        # if CODECOV_TOKEN secret is not yet configured in the repo.
        # To enable hard-fail: set CODECOV_TOKEN secret and change to true.
        with:
          files: coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
