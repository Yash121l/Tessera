global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "tessera-bot"
    static_configs:
      - targets: ["bot:9090"]   # prometheus_client default port
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: "tessera-healthcheck"
    static_configs:
      - targets: ["bot:8080"]
    metrics_path: /healthz      # just for black-box probing; not a real metrics path
    scrape_interval: 15s
